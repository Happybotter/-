<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>太阳能板3D模型展示</title>
    <!-- 引入Three.js核心库和轨道控制器 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 24px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            z-index: 100;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        #title span {
            color: #ffd700;
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 100;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        #instructions i {
            font-style: normal;
            margin: 0 4px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="title">
        ☀️ <span>太阳能板</span> 3D模型展示
    </div>
    <div id="instructions">
        🖱️ <i>鼠标拖拽</i> 旋转视角 | 📜 <i>滚轮</i> 缩放
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // 深蓝色夜空背景
        
        // 添加一些星星效果（小点）
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 200;
            starsPositions[i+1] = (Math.random() - 0.5) * 200;
            starsPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.1});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 1, 0);

        // WebGL渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 开启阴影
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和阴影
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 启用惯性
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2; // 限制不能转到地下
        controls.target.set(0, 1, 0);

        // --- 灯光设置 ---
        
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // 主光源 - 模拟太阳
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(5, 10, 7);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 10;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 15;
        scene.add(sunLight);

        // 补光
        const fillLight = new THREE.DirectionalLight(0x4466ff, 0.5);
        fillLight.position.set(-5, 0, 5);
        scene.add(fillLight);

        // 背光
        const backLight = new THREE.PointLight(0x4466ff, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);

        // 添加一个辅助地面（半透明，用来接收阴影）
        const groundGeometry = new THREE.CircleGeometry(10, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x223344, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 添加一个网格辅助线（可选，为了更好看）
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.19;
        scene.add(gridHelper);

        // --- 创建太阳能板模型 ---
        const solarPanelGroup = new THREE.Group();

        // 1. 底座支架
        const baseMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.4, metalness: 0.6 });
        const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 });
        
        // 底座圆盘
        const basePlate = new THREE.Mesh(
            new THREE.CylinderGeometry(1.2, 1.2, 0.2, 32),
            baseMaterial
        );
        basePlate.position.y = 0;
        basePlate.castShadow = true;
        basePlate.receiveShadow = true;
        solarPanelGroup.add(basePlate);

        // 立柱
        const pole = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.4, 1.5, 16),
            poleMaterial
        );
        pole.position.y = 0.85;
        pole.castShadow = true;
        pole.receiveShadow = true;
        solarPanelGroup.add(pole);

        // 顶部转轴
        const hinge = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.2, 0.4),
            new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 })
        );
        hinge.position.y = 1.6;
        hinge.castShadow = true;
        hinge.receiveShadow = true;
        solarPanelGroup.add(hinge);

        // 2. 太阳能板框架
        const frameGroup = new THREE.Group();
        frameGroup.position.y = 1.8;

        // 外框
        const frameMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.5 });
        const leftBar = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, 2.2),
            frameMaterial
        );
        leftBar.position.set(-1.1, 0, 0);
        leftBar.castShadow = true;
        leftBar.receiveShadow = true;
        frameGroup.add(leftBar);

        const rightBar = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, 2.2),
            frameMaterial
        );
        rightBar.position.set(1.1, 0, 0);
        rightBar.castShadow = true;
        rightBar.receiveShadow = true;
        frameGroup.add(rightBar);

        const topBar = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 0.1, 0.1),
            frameMaterial
        );
        topBar.position.set(0, 1.1, 0);
        topBar.castShadow = true;
        topBar.receiveShadow = true;
        frameGroup.add(topBar);

        const bottomBar = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 0.1, 0.1),
            frameMaterial
        );
        bottomBar.position.set(0, -1.1, 0);
        bottomBar.castShadow = true;
        bottomBar.receiveShadow = true;
        frameGroup.add(bottomBar);

        // 中间横梁
        const midBar = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 0.1, 0.1),
            frameMaterial
        );
        midBar.position.set(0, 0, 0);
        midBar.rotation.y = Math.PI / 2;
        midBar.castShadow = true;
        midBar.receiveShadow = true;
        frameGroup.add(midBar);

        // 3. 太阳能电池片（多个小矩形）
        const cellMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a4c7a, 
            emissive: 0x112233,
            roughness: 0.2,
            metalness: 0.1
        });
        
        // 创建多个电池片，模拟太阳能板的样子
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 6; j++) {
                const cell = new THREE.Mesh(
                    new THREE.BoxGeometry(0.4, 0.05, 0.3),
                    cellMaterial
                );
                cell.position.set(-0.75 + i * 0.5, 0.6 - j * 0.24, 0.05);
                cell.castShadow = true;
                cell.receiveShadow = true;
                frameGroup.add(cell);
            }
        }

        // 添加一些反光线条（模拟电池片之间的分割线）
        const lineMaterial = new THREE.MeshStandardMaterial({ color: 0x88aadd, emissive: 0x112244 });
        for (let i = 0; i < 5; i++) {
            const line = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 0.02, 0.02),
                lineMaterial
            );
            line.position.set(0, 0.72 - i * 0.36, 0.1);
            line.castShadow = true;
            line.receiveShadow = true;
            frameGroup.add(line);
        }

        solarPanelGroup.add(frameGroup);

        // 添加一些小的装饰/螺丝
        const screwMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x221100 });
        for (let i = 0; i < 4; i++) {
            const screw = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 0.05, 8),
                screwMaterial
            );
            screw.rotation.x = Math.PI / 2;
            screw.position.set(i < 2 ? -1.0 : 1.0, 1.85, i % 2 === 0 ? -1.0 : 1.0);
            screw.castShadow = true;
            screw.receiveShadow = true;
            solarPanelGroup.add(screw);
        }

        // 调整整体位置
        solarPanelGroup.position.y = 0;
        solarPanelGroup.position.x = 0;
        solarPanelGroup.position.z = 0;
        
        scene.add(solarPanelGroup);

        // 添加一个半透明的光柱效果（可选）
        const lightBeamGeometry = new THREE.CylinderGeometry(0.5, 1.5, 3, 16, 1, true);
        const lightBeamMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffaa33, 
            transparent: true, 
            opacity: 0.1,
            side: THREE.DoubleSide
        });
        const lightBeam = new THREE.Mesh(lightBeamGeometry, lightBeamMaterial);
        lightBeam.position.set(2, 1.5, 2);
        lightBeam.rotation.x = 0.2;
        lightBeam.rotation.z = 0.3;
        scene.add(lightBeam);

        // 添加几个浮动的粒子（模拟阳光中的尘埃）
        const dustGeometry = new THREE.BufferGeometry();
        const dustCount = 50;
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount * 3; i += 3) {
            dustPositions[i] = (Math.random() - 0.5) * 8;
            dustPositions[i+1] = (Math.random() - 0.5) * 5 + 2;
            dustPositions[i+2] = (Math.random() - 0.5) * 8;
        }
        dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMaterial = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.05, transparent: true, opacity: 0.3 });
        const dust = new THREE.Points(dustGeometry, dustMaterial);
        scene.add(dust);

        // --- 添加一个简单的CSS标签（显示“太阳能板”）---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '☀️ 光伏板';
        labelDiv.style.color = '#ffd700';
        labelDiv.style.fontSize = '20px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.textShadow = '1px 1px 3px black';
        labelDiv.style.background = 'rgba(0,0,0,0.5)';
        labelDiv.style.padding = '4px 12px';
        labelDiv.style.borderRadius = '20px';
        labelDiv.style.border = '1px solid #ffd700';
        labelDiv.style.backdropFilter = 'blur(5px)';
        
        const label = new CSS2DObject(labelDiv);
        label.position.set(0, 2.5, 0);
        solarPanelGroup.add(label);

        // 初始化CSS2渲染器
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // 让标签不阻挡鼠标操作
        document.body.appendChild(labelRenderer.domElement);

        // --- 动画循环 ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // 让星星缓慢旋转
            stars.rotation.y += 0.0001;
            
            // 让尘埃粒子浮动
            dust.rotation.y += 0.001;
            
            // 让光柱缓慢变色/移动（简单动画）
            lightBeam.material.opacity = 0.1 + Math.sin(elapsedTime * 2) * 0.05;
            
            // 自动旋转（如果用户没有交互）
            controls.update();

            // 渲染主场景
            renderer.render(scene, camera);
            
            // 渲染CSS标签
            labelRenderer.render(scene, camera);

            requestAnimationFrame(animate);
        }

        animate();

        // --- 窗口大小自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 添加一个简单的点击提示（控制台）
        console.log('太阳能板3D模型已加载！可以使用鼠标拖拽查看各个角度。');
    </script>
</body>
</html>
