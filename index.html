<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ 聚合天气 · 免费API示例站</title>
    <!-- 简单样式，适应GitHub Pages，干净清晰 -->
     <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1.5rem;
        }
        .weather-app {
            max-width: 1400px;
            width: 100%;
        }
        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .title h1 {
            font-size: 2rem;
            margin: 0 0 0.25rem 0;
            background: linear-gradient(145deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: #2c3e50;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-panel {
            background: white;
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            box-shadow: 0 8px 20px rgba(0,20,50,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .search-panel input, .search-panel select {
            border: none;
            padding: 0.7rem 1rem;
            font-size: 1rem;
            border-radius: 40px;
            background: #f8fafd;
            outline: none;
            min-width: 160px;
            flex: 1 1 auto;
        }
        .search-panel button {
            background: #1e3c72;
            border: none;
            color: white;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            border: 1px solid #ffffff30;
            box-shadow: 0 4px 8px rgba(0,40,80,0.3);
        }
        .search-panel button:hover {
            background: #2a4b8a;
            transform: scale(1.02);
        }
        .status-msg {
            background: #d4edda;
            color: #155724;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            border-left: 5px solid #28a745;
            margin: 1rem 0;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ccc;
            border-top-color: #1e3c72;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 卡片网格 */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 20px 40px -12px rgba(0,32,64,0.25);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card h2 {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.7rem;
            margin-top: 0;
            margin-bottom: 1.8rem;
            color: #0a2540;
            border-bottom: 2px solid #e6edf5;
            padding-bottom: 0.75rem;
        }
        .now-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .metric {
            background: #ffffffd9;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid #f0f5fa;
        }
        .metric .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #527a9b;
            margin-bottom: 0.5rem;
        }
        .metric .value {
            font-size: 2rem;
            font-weight: 600;
            color: #0b2b40;
            line-height: 1.2;
        }
        .metric .sub {
            font-size: 0.95rem;
            color: #3c5e7a;
            margin-top: 0.3rem;
        }
        .aqi-grid, .pollutants {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .pill {
            background: #e9f0f9;
            border-radius: 40px;
            padding: 0.4rem 1.4rem;
            font-weight: 500;
            color: #103456;
        }
        .forecast-cards, .hourly-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .forecast-card, .hourly-card {
            background: #ffffffb3;
            border-radius: 1.5rem;
            padding: 1.2rem 1rem;
            text-align: center;
            border: 1px solid #dde7f0;
            backdrop-filter: blur(4px);
        }
        .forecast-card .day { font-weight: 600; font-size: 1.1rem; }
        .forecast-card .temp { font-size: 1.5rem; font-weight: 650; margin: 0.3rem 0; }
        .life-indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem;
        }
        .life-item {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            border-left: 5px solid #4f7aa6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .life-item h4 { margin: 0 0 0.4rem 0; color: #1c3f5c; }
        .life-item .brief { font-weight: 600; color: #1e6120; margin-right: 1rem; }
        .life-item .advice { color: #335e7e; font-size: 0.95rem; margin-top: 0.5rem; }
        .minutely-block {
            background: #e2eefa;
            border-radius: 2rem;
            padding: 1.2rem;
            font-family: monospace;
            overflow-x: auto;
            white-space: nowrap;
        }
        .footer-note {
            text-align: center;
            margin-top: 3rem;
            color: #6c86a0;
            font-size: 0.9rem;
        }
        .small-note {
            color: #7089a3;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>
<div class="weather-app">
    <header>
        <div class="title">
            <h1>⛅ 开源天气 · 免费聚合</h1>
            <span class="badge">数据来源 uapis.cn · 完全免费</span>
        </div>
        <div class="search-panel">
            <input type="text" id="cityInput" placeholder="城市名 (例如: 北京, Tokyo)" value="北京">
            <select id="langSelect">
                <option value="zh" selected>中文 🇨🇳</option>
                <option value="en">英文 🇬🇧</option>
            </select>
            <button id="fetchBtn">🌍 查询天气</button>
        </div>
    </header>

    <div id="statusMessage" class="status-msg" style="display: none;"></div>

    <div class="dashboard" id="weatherDashboard" style="display: none;">
        <!-- 当前天气 + 扩展卡片 -->
        <div class="card" id="currentCard">
            <h2>📍 当前实况 · <span id="cityNameDisplay"></span></h2>
            <div class="now-grid" id="currentGrid"></div>
        </div>

        <!-- 空气质量及污染物 (扩展) -->
        <div class="card" id="aqiCard" style="display: none;">
            <h2>💨 空气质量 (扩展)</h2>
            <div id="aqiContent"></div>
        </div>

        <!-- 多天预报 -->
        <div class="card" id="forecastCard" style="display: none;">
            <h2>📅 未来7天预报</h2>
            <div class="forecast-cards" id="forecastContainer"></div>
        </div>

        <!-- 逐小时预报 -->
        <div class="card" id="hourlyCard" style="display: none;">
            <h2>⏳ 未来24小时 · 逐小时</h2>
            <div class="hourly-cards" id="hourlyContainer"></div>
        </div>

        <!-- 分钟级降水 (国内城市) -->
        <div class="card" id="minutelyCard" style="display: none;">
            <h2>🌧️ 分钟级降水 (2小时 · 每5分钟)</h2>
            <div id="minutelyContent"></div>
        </div>

        <!-- 生活指数 -->
        <div class="card" id="indicesCard" style="display: none;">
            <h2>🧴 18项生活指数</h2>
            <div class="life-indices-grid" id="indicesContainer"></div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ 使用 uapis.cn 免费天气接口 · 演示所有可用字段 (extended, forecast, hourly, minutely, indices=true) <br>
        城市不存在或网络错误会显示提示 · 基于示例代码构建，适配GitHub Pages
    </div>
</div>

<script>
    (function() {
        // 获取DOM元素
        const cityInput = document.getElementById('cityInput');
        const langSelect = document.getElementById('langSelect');
        const fetchBtn = document.getElementById('fetchBtn');
        const statusDiv = document.getElementById('statusMessage');
        const dashboard = document.getElementById('weatherDashboard');

        // 各个卡片容器
        const cityNameSpan = document.getElementById('cityNameDisplay');
        const currentGrid = document.getElementById('currentGrid');
        const aqiCard = document.getElementById('aqiCard');
        const aqiContent = document.getElementById('aqiContent');
        const forecastCard = document.getElementById('forecastCard');
        const forecastContainer = document.getElementById('forecastContainer');
        const hourlyCard = document.getElementById('hourlyCard');
        const hourlyContainer = document.getElementById('hourlyContainer');
        const minutelyCard = document.getElementById('minutelyCard');
        const minutelyContent = document.getElementById('minutelyContent');
        const indicesCard = document.getElementById('indicesCard');
        const indicesContainer = document.getElementById('indicesContainer');

        // 显示状态消息 (成功/错误/加载)
        function setStatus(msg, isError = false, isLoading = false) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = msg;
            if (isError) {
                statusDiv.classList.add('error-msg');
                statusDiv.classList.remove('status-msg'); 
                statusDiv.classList.add('status-msg', 'error-msg'); 
            } else {
                statusDiv.classList.remove('error-msg');
            }
            if (isLoading) {
                statusDiv.innerHTML = `<span class="loading"></span>  ${msg}`;
            } else {
                statusDiv.innerHTML = msg;
            }
        }

        function clearStatus() {
            statusDiv.style.display = 'none';
        }

        // 隐藏所有动态卡片 (除了currentCard可能隐藏，通过dashboard控制)
        function hideAllCards() {
            aqiCard.style.display = 'none';
            forecastCard.style.display = 'none';
            hourlyCard.style.display = 'none';
            minutelyCard.style.display = 'none';
            indicesCard.style.display = 'none';
        }

        // 主函数：调用API并渲染
        async function fetchWeather() {
            const city = cityInput.value.trim();
            const lang = langSelect.value;

            if (!city) {
                setStatus('请输入城市名称', true);
                return;
            }

            // 显示加载中
            setStatus('正在获取天气数据...', false, true);
            dashboard.style.display = 'none';
            hideAllCards();

            // 构建URL，启用所有可选模块 (extended, forecast, hourly, minutely, indices 全部开启)
            // 使用 city 参数，不使用adcode以简化演示
            const url = `https://uapis.cn/api/v1/misc/weather?city=${encodeURIComponent(city)}&lang=${lang}&extended=true&forecast=true&hourly=true&minutely=true&indices=true`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // 处理HTTP错误状态
                if (!response.ok) {
                    let errorMsg = `请求失败 (${response.status})`;
                    if (data && data.message) errorMsg += `: ${data.message}`;
                    else if (data && data.code) errorMsg += `: ${data.code}`;
                    throw new Error(errorMsg);
                }

                // 检查必要字段，如果city是空的可能数据异常
                if (!data || typeof data !== 'object') throw new Error('返回数据格式错误');

                // 成功——渲染所有信息
                renderAll(data, lang);
                setStatus(`✅ 数据更新成功 · ${data.city || city} · 时间: ${data.report_time || '--'}`, false, false);
                dashboard.style.display = 'flex';

            } catch (error) {
                console.error(error);
                setStatus(`❌ 错误: ${error.message}`, true);
                dashboard.style.display = 'none';
            }
        }

        function renderAll(data, lang) {
            // 更新城市显示
            cityNameSpan.textContent = `${data.city || '--'}${data.province ? ' · ' + data.province : ''}`;

            // ---- 当前实况 + 扩展字段 ----
            let currentHtml = '';

            // 基础必填
            currentHtml += createMetric('天气', data.weather || '--', '');
            currentHtml += createMetric('温度', data.temperature != null ? `${data.temperature} °C` : '--', `体感 ${data.feels_like ?? '--'} °C`);
            currentHtml += createMetric('风向/风力', `${data.wind_direction || '--'} ${data.wind_power || ''}`, '');
            currentHtml += createMetric('湿度', data.humidity != null ? `${data.humidity} %` : '--', '');
            currentHtml += createMetric('更新时间', data.report_time ? data.report_time.split(' ')[1] : '--', data.report_time || '');

            // 扩展字段 (extended=true 下存在)
            if (data.visibility != null) currentHtml += createMetric('能见度', `${data.visibility} km`, '');
            if (data.pressure != null) currentHtml += createMetric('气压', `${data.pressure} hPa`, '');
            if (data.uv != null) currentHtml += createMetric('紫外线指数', data.uv, '');
            if (data.precipitation != null) currentHtml += createMetric('降水量', `${data.precipitation} mm`, '');
            if (data.cloud != null) currentHtml += createMetric('云量', `${data.cloud} %`, '');
            if (data.temp_max != null) currentHtml += createMetric('今日最高', `${data.temp_max} °C`, `最低 ${data.temp_min ?? '--'} °C`);

            currentGrid.innerHTML = currentHtml;

            // ---- 空气质量 (扩展) ----
            if (data.aqi != null) {
                aqiCard.style.display = 'block';
                let aqiHtml = `<div class="metric" style="grid-column: span 2;"><span class="label">AQI 指数 / 等级</span>
                    <div class="value">${data.aqi} · ${data.aqi_category || '--'}</div>
                    <div class="sub">主要污染物: ${data.aqi_primary || '--'}  (等级: ${data.aqi_level || '--'}级)</div>
                </div>`;
                if (data.air_pollutants) {
                    const p = data.air_pollutants;
                    aqiHtml += '<div class="pollutants">';
                    if (p.pm25 != null) aqiHtml += `<span class="pill">PM2.5: ${p.pm25} μg</span>`;
                    if (p.pm10 != null) aqiHtml += `<span class="pill">PM10: ${p.pm10} μg</span>`;
                    if (p.o3 != null) aqiHtml += `<span class="pill">O₃: ${p.o3} μg</span>`;
                    if (p.no2 != null) aqiHtml += `<span class="pill">NO₂: ${p.no2} μg</span>`;
                    if (p.so2 != null) aqiHtml += `<span class="pill">SO₂: ${p.so2} μg</span>`;
                    if (p.co != null) aqiHtml += `<span class="pill">CO: ${p.co} mg</span>`;
                    aqiHtml += '</div>';
                } else {
                    aqiHtml += '<div class="sub">无污染物分项数据</div>';
                }
                aqiContent.innerHTML = aqiHtml;
            } else {
                aqiCard.style.display = 'none';
            }

            // ---- 多天预报 forecast ----
            // ---- 多天预报 forecast (修复日期和星期) ----
            // ---- 多天预报 forecast (横向卡片, 简洁版) ----
            if (data.forecast && Array.isArray(data.forecast) && data.forecast.length) {
                forecastCard.style.display = 'block';
                
                // 中文星期映射
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                
                // 天气图标映射（可以根据天气文本显示对应图标）
                const getWeatherIcon = (weather) => {
                    const w = String(weather || '').toLowerCase();
                    if (w.includes('晴')) return '☀️';
                    if (w.includes('多云')) return '⛅';
                    if (w.includes('阴')) return '☁️';
                    if (w.includes('小雨') || w.includes('阵雨')) return '🌦️';
                    if (w.includes('中雨')) return '🌧️';
                    if (w.includes('大雨')) return '🌧️💧';
                    if (w.includes('雷')) return '⛈️';
                    if (w.includes('雪')) return '🌨️';
                    if (w.includes('雾')) return '🌫️';
                    if (w.includes('霾')) return '😷';
                    return '☀️'; // 默认晴天
                };
                
                let fcHtml = '<div style="display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 20px 0;">';
                
                data.forecast.forEach((day, index) => {
                    // 处理日期和星期
                    let displayDate = day.date || '--';
                    let weekLabel = '';
                    let isToday = false;
                    let isTomorrow = false;
                    
                    if (day.date) {
                        try {
                            const dateObj = new Date(day.date);
                            if (!isNaN(dateObj.getTime())) {
                                const weekIndex = dateObj.getDay();
                                const weekName = weekdays[weekIndex];
                                
                                // 获取今天的日期
                                const today = new Date();
                                const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                                
                                // 获取明天的日期
                                const tomorrow = new Date(today);
                                tomorrow.setDate(tomorrow.getDate() + 1);
                                const tomorrowStr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;
                                
                                if (day.date === todayStr) {
                                    weekLabel = '今天';
                                    isToday = true;
                                } else if (day.date === tomorrowStr) {
                                    weekLabel = '明天';
                                } else {
                                    // 显示星期几（去掉"星期"两个字，更简洁）
                                    weekLabel = weekName.replace('星期', '周');
                                }
                            }
                        } catch {
                            weekLabel = day.week || '';
                        }
                    }
                    
                    // 获取天气图标（使用白天天气）
                    const dayIcon = getWeatherIcon(day.weather_day);
                    const nightIcon = getWeatherIcon(day.weather_night);
                    
                    // 格式化日期显示（去掉年份，只显示月-日）
                    const shortDate = displayDate.substring(5); // "03-16"
                    
                    // 卡片样式
                    const cardStyle = `
                        min-width: 100px;
                        background: ${isToday ? 'linear-gradient(145deg, #ffd166, #ffb347)' : 'white'};
                        color: ${isToday ? '#2d3e50' : 'inherit'};
                        border-radius: 20px;
                        padding: 15px 10px;
                        text-align: center;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
                        border: 1px solid ${isToday ? '#ffb347' : '#e9f0f9'};
                        transition: transform 0.2s;
                        cursor: default;
                    `;
                    
                    fcHtml += `
                        <div style="${cardStyle}">
                            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 5px;">${shortDate}</div>
                            <div style="font-size: 0.9rem; color: ${isToday ? '#2d3e50' : '#5f7d9c'}; margin-bottom: 10px; background: ${isToday ? 'rgba(255,255,255,0.3)' : '#f0f6fd'}; display: inline-block; padding: 3px 12px; border-radius: 30px;">
                                ${weekLabel}
                            </div>
                            <div style="font-size: 2.2rem; margin: 5px 0;">${dayIcon}</div>
                            <div style="font-size: 1.3rem; font-weight: 600;">
                                <span style="color: ${isToday ? '#2d3e50' : '#e67e22'};">${day.temp_max ?? '--'}°</span>
                                <span style="color: ${isToday ? '#3a4e62' : '#3498db'};">/${day.temp_min ?? '--'}°</span>
                            </div>
                            <div style="font-size: 0.8rem; color: ${isToday ? '#2d3e50' : '#7089a3'}; margin-top: 5px;">
                                ${day.weather_day || '--'}
                            </div>
                        </div>
                    `;
                });
                
                fcHtml += '</div>';
                
                // 添加一个说明：可以横向滑动
                fcHtml += '<div style="text-align: right; color: #8a9fb0; font-size: 0.8rem; margin-top: 5px;">← 左右滑动查看更多 →</div>';
                
                forecastContainer.innerHTML = fcHtml;
            } else {
                forecastCard.style.display = 'none';
            }

            // ---- 逐小时预报 hourly (折线图版 - 宽屏优化) ----
            if (data.hourly_forecast && Array.isArray(data.hourly_forecast) && data.hourly_forecast.length) {
                hourlyCard.style.display = 'block';
                
                // 准备数据（取24小时）
                const hourData = data.hourly_forecast.slice(0, 24);
                
                // 生成时间标签（格式：HH:MM）
                const times = hourData.map(h => {
                    if (h.time) {
                        try {
                            const date = new Date(h.time);
                            if (!isNaN(date.getTime())) {
                                return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                            }
                            const match = h.time.match(/T(\d{2}:\d{2})/);
                            return match ? match[1] : h.time.slice(11, 16);
                        } catch {
                            return h.time.includes('T') ? h.time.split('T')[1]?.slice(0,5) : '--:--';
                        }
                    }
                    return '--:--';
                });
                
                // 温度数据
                const temperatures = hourData.map(h => h.temperature !== undefined ? h.temperature : null);
                
                // 湿度数据
                const humidities = hourData.map(h => h.humidity !== undefined ? h.humidity : null);
                
                // 风速数据
                const windSpeeds = hourData.map(h => h.wind_speed !== undefined ? h.wind_speed : null);
                
                // 降水概率数据
                const popData = hourData.map(h => h.pop !== undefined ? h.pop : null);
                
                // 降水量数据
                const precipData = hourData.map(h => h.precip !== undefined ? h.precip : null);
                
                // 构建图表容器和控制器HTML - 修改为一行按钮，图表全宽
               let chartHtml = `
                    <div style="margin-bottom: 20px; width: 100%;">
                        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;" id="chart-toggle-btns">
                            <button class="chart-btn active" data-type="temp">🌡️ 温度</button>
                            <button class="chart-btn" data-type="humidity">💧 湿度</button>
                            <button class="chart-btn" data-type="wind">💨 风速</button>
                            <button class="chart-btn" data-type="pop">☔ 降水概率</button>
                            <button class="chart-btn" data-type="precip">🌧️ 降水量</button>
                        </div>
                        <div id="hourly-chart" style="width: 100%; height: 350px; margin: 0; padding: 0;"></div>
                        <div style="margin-top: 15px; color: #7089a3; font-size: 0.85rem; text-align: center;">点击按钮切换数据显示</div>
                    </div>
                `;
                
                hourlyContainer.innerHTML = chartHtml;
                
                // 添加按钮样式
                const style = document.createElement('style');
                style.textContent = `
                    .chart-btn {
                        background: #f0f6fd;
                        border: none;
                        padding: 8px 20px;
                        border-radius: 40px;
                        font-size: 1rem;
                        cursor: pointer;
                        transition: all 0.2s;
                        color: #2c3e50;
                        border: 1px solid #d0e0f0;
                        font-weight: 500;
                        box-shadow: 0 2px 5px rgba(0,0,0,0.03);
                        flex: 0 1 auto;
                    }
                    .chart-btn:hover {
                        background: #dde9f5;
                        transform: translateY(-2px);
                        box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                    }
                    .chart-btn.active {
                        background: #2a6f97;
                        color: white;
                        border-color: #1e4a6f;
                        box-shadow: 0 4px 10px rgba(42,111,151,0.3);
                    }
                    #hourly-chart {
                        border-radius: 20px;
                        background: rgba(255,255,255,0.5);
                        padding: 5px;
                    }
                `;
                document.head.appendChild(style);
                
                // 初始化折线图
                const chartDom = document.getElementById('hourly-chart');
                const myChart = echarts.init(chartDom);
                
                // 通用图表配置 - 调整边距使图表更宽
                const baseOptions = {
                    tooltip: {
                        trigger: 'axis',
                        formatter: function(params) {
                            let res = params[0].axisValue + '<br/>';
                            params.forEach(p => {
                                res += `${p.marker} ${p.seriesName}: ${p.value}${p.seriesName.includes('温度') ? '°C' : 
                                    p.seriesName.includes('湿度') ? '%' : 
                                    p.seriesName.includes('风速') ? ' km/h' : 
                                    p.seriesName.includes('降水概率') ? '%' : ' mm'}<br/>`;
                            });
                            return res;
                        },
                        backgroundColor: 'rgba(255,255,255,0.95)',
                        borderColor: '#2a6f97',
                        borderWidth: 1,
                        textStyle: { color: '#2c3e50' }
                    },
                    grid: {
                        left: '8%',
                        right: '5%',
                        bottom: '12%',
                        top: '12%',
                        containLabel: false
                    },
                    xAxis: {
                        type: 'category',
                        data: times,
                        axisLabel: {
                            rotate: 30,
                            interval: 2, // 每2个显示一个，更清晰
                            fontSize: 11,
                            color: '#2c3e50',
                            fontWeight: '500'
                        },
                        axisLine: { lineStyle: { color: '#bdd3e8' } },
                        axisTick: { show: false }
                    },
                    yAxis: {
                        type: 'value',
                        name: '',
                        splitLine: { lineStyle: { color: '#e9f0f9', type: 'dashed' } },
                        axisLabel: { fontSize: 11, color: '#2c3e50' }
                    },
                    series: []
                };
                
                // 定义不同数据系列的配置
                const seriesConfig = {
                    temp: {
                        name: '温度',
                        type: 'line',
                        data: temperatures,
                        smooth: true,
                        color: '#e67e22',
                        lineStyle: { width: 4 },
                        symbol: 'circle',
                        symbolSize: 8,
                        areaStyle: { color: 'rgba(230, 126, 34, 0.1)' }
                    },
                    humidity: {
                        name: '湿度',
                        type: 'line',
                        data: humidities,
                        smooth: true,
                        color: '#3498db',
                        lineStyle: { width: 4 },
                        symbol: 'diamond',
                        symbolSize: 8,
                        areaStyle: { color: 'rgba(52, 152, 219, 0.1)' }
                    },
                    wind: {
                        name: '风速',
                        type: 'line',
                        data: windSpeeds,
                        smooth: true,
                        color: '#2ecc71',
                        lineStyle: { width: 4 },
                        symbol: 'triangle',
                        symbolSize: 8,
                        areaStyle: { color: 'rgba(46, 204, 113, 0.1)' }
                    },
                    pop: {
                        name: '降水概率',
                        type: 'line',
                        data: popData,
                        smooth: true,
                        color: '#9b59b6',
                        lineStyle: { width: 4 },
                        symbol: 'rect',
                        symbolSize: 8,
                        areaStyle: { color: 'rgba(155, 89, 182, 0.1)' }
                    },
                    precip: {
                        name: '降水量',
                        type: 'line',
                        data: precipData,
                        smooth: true,
                        color: '#e74c3c',
                        lineStyle: { width: 4 },
                        symbol: 'roundRect',
                        symbolSize: 8,
                        areaStyle: { color: 'rgba(231, 76, 60, 0.1)' }
                    }
                };
                
                // 默认显示温度
                myChart.setOption({
                    ...baseOptions,
                    series: [seriesConfig.temp]
                });
                
                // 绑定按钮切换事件
                const buttons = document.querySelectorAll('.chart-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        // 移除所有active类
                        buttons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        
                        const type = this.dataset.type;
                        
                        // 根据选择的类型更新series
                        if (type === 'temp') {
                            myChart.setOption({ series: [seriesConfig.temp] });
                        } else if (type === 'humidity') {
                            myChart.setOption({ series: [seriesConfig.humidity] });
                        } else if (type === 'wind') {
                            myChart.setOption({ series: [seriesConfig.wind] });
                        } else if (type === 'pop') {
                            myChart.setOption({ series: [seriesConfig.pop] });
                        } else if (type === 'precip') {
                            myChart.setOption({ series: [seriesConfig.precip] });
                        }
                    });
                });
                
                // 窗口大小变化时自适应
                window.addEventListener('resize', function() {
                    myChart.resize();
                });
                
            } else {
                hourlyCard.style.display = 'none';
            }

            // ---- 分钟级降水 minutely (美观界面版) ----
            if (data.minutely_precip && data.minutely_precip.data && data.minutely_precip.data.length) {
                minutelyCard.style.display = 'block';
                const m = data.minutely_precip;
                
                // 格式化更新时间
                let updateTimeStr = '';
                if (m.update_time) {
                    try {
                        const updateDate = new Date(m.update_time);
                        updateTimeStr = `${updateDate.getHours().toString().padStart(2,'0')}:${updateDate.getMinutes().toString().padStart(2,'0')}`;
                    } catch {
                        updateTimeStr = m.update_time;
                    }
                }
                
                // 找出最大降水量用于进度条计算
                const precipValues = m.data.map(p => p.precip || 0);
                const maxPrecip = Math.max(...precipValues, 0.1); // 避免除以0
                
                // 构建降水时间轴HTML
                let timelineHtml = `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span style="background: #2a6f97; color: white; padding: 5px 15px; border-radius: 30px; font-weight: 600;">
                                ⏱️ ${m.summary || '未来2小时降水预测'}
                            </span>
                            <span style="color: #2c3e50; background: #e9f0f9; padding: 5px 15px; border-radius: 30px;">
                                更新时间: ${updateTimeStr}
                            </span>
                        </div>
                    </div>
                `;
                
                // 降水强度图例
                timelineHtml += `
                    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; background: #f8fafd; padding: 12px 18px; border-radius: 30px;">
                        <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 20px; height: 20px; background: #c7e9c0; border-radius: 4px;"></span> 无降水</div>
                        <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 20px; height: 20px; background: #7fcdbb; border-radius: 4px;"></span> 小雨 (≤1mm)</div>
                        <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 20px; height: 20px; background: #2c7fb8; border-radius: 4px;"></span> 中雨 (1-3mm)</div>
                        <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 20px; height: 20px; background: #253494; border-radius: 4px;"></span> 大雨 (>3mm)</div>
                        <div style="display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 20px; height: 20px; background: #deebf7; border: 2px solid #9ecae1; border-radius: 4px;"></span> 降雪</div>
                    </div>
                `;
                
                // 时间轴容器
                timelineHtml += '<div style="overflow-x: auto; padding: 10px 0 20px 0;">';
                timelineHtml += '<div style="display: flex; gap: 4px; min-width: max-content;">';
                
                // 生成每个时间点的降水卡片
                m.data.slice(0, 24).forEach((point, index) => {
                    // 解析时间
                    let timeStr = '--:--';
                    if (point.time) {
                        try {
                            const date = new Date(point.time);
                            if (!isNaN(date.getTime())) {
                                timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                            } else {
                                const match = point.time.match(/T(\d{2}:\d{2})/);
                                timeStr = match ? match[1] : point.time.slice(11, 16);
                            }
                        } catch {
                            timeStr = point.time.includes('T') ? point.time.split('T')[1]?.slice(0,5) || '--:--' : '--:--';
                        }
                    }
                    
                    const precip = point.precip || 0;
                    const isSnow = point.type === 'snow';
                    
                    // 根据降水量确定颜色和高度
                    let barColor = '#c7e9c0'; // 默认浅绿（无雨）
                    let barHeight = 30;
                    let precipText = `${precip.toFixed(1)}mm`;
                    
                    if (isSnow) {
                        barColor = '#deebf7';
                        barHeight = 40;
                        precipText = '❄️ 雪';
                    } else if (precip > 0) {
                        // 降水量越大颜色越深，柱子越高
                        if (precip <= 1) {
                            barColor = '#7fcdbb'; // 小雨
                            barHeight = 40;
                        } else if (precip <= 3) {
                            barColor = '#2c7fb8'; // 中雨
                            barHeight = 55;
                        } else {
                            barColor = '#253494'; // 大雨
                            barHeight = 70;
                        }
                    }
                    
                    // 相对高度（基于最大降水量，但最低30px）
                    const relativeHeight = Math.max(30, Math.min(80, 30 + (precip / maxPrecip) * 50));
                    
                    timelineHtml += `
                        <div style="display: flex; flex-direction: column; align-items: center; width: 65px;">
                            <div style="font-size: 0.75rem; font-weight: 600; color: #2c3e50; margin-bottom: 4px;">${timeStr}</div>
                            <div style="height: 80px; display: flex; align-items: flex-end; margin-bottom: 5px;">
                                <div style="width: 32px; height: ${isSnow ? 40 : relativeHeight}px; background: ${barColor}; border-radius: 12px 12px 6px 6px; border: ${isSnow ? '2px solid #9ecae1' : 'none'}; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: height 0.2s;"></div>
                            </div>
                            <div style="font-size: 0.75rem; background: ${precip > 0 ? '#e9f0f9' : 'transparent'}; padding: 2px 6px; border-radius: 20px; font-weight: ${precip > 0 ? '600' : '400'}; color: ${precip > 0.5 ? '#1e3c72' : '#5f7d9c'};">${precipText}</div>
                        </div>
                    `;
                });
                
                timelineHtml += '</div></div>';
                
                // 添加统计信息
                const totalPrecip = precipValues.reduce((a, b) => a + b, 0).toFixed(1);
                const rainPoints = precipValues.filter(p => p > 0).length;
                
                timelineHtml += `
                    <div style="display: flex; gap: 20px; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bdd3e8; color: #2c3e50; flex-wrap: wrap;">
                        <div><span style="font-weight: 600;">📊 总降水量:</span> ${totalPrecip} mm</div>
                        <div><span style="font-weight: 600;">⏳ 降雨时段:</span> ${rainPoints} 个时段 (每5分钟)</div>
                        <div><span style="font-weight: 600;">🌧️ 最大强度:</span> ${maxPrecip.toFixed(1)} mm/5min</div>
                    </div>
                `;
                
                minutelyContent.innerHTML = timelineHtml;
            } else {
                minutelyCard.style.display = 'none';
            }

            // ---- 生活指数 indices ----
            // ---- 生活指数 indices (中文显示版) ----
            if (data.life_indices && Object.keys(data.life_indices).length) {
                indicesCard.style.display = 'block';
                
                // 中文名称映射表
                const indexNameMap = {
                    'clothing': '👔 穿衣指数',
                    'uv': '☀️ 紫外线指数',
                    'car_wash': '🚗 洗车指数',
                    'drying': '👕 晾晒指数',
                    'air_conditioner': '❄️ 空调指数',
                    'cold_risk': '🤧 感冒指数',
                    'exercise': '🏃 运动指数',
                    'comfort': '😌 舒适度指数',
                    'travel': '✈️ 出行指数',
                    'fishing': '🎣 钓鱼指数',
                    'allergy': '🌿 过敏指数',
                    'sunscreen': '🧴 防晒指数',
                    'mood': '😊 心情指数',
                    'beer': '🍺 啤酒指数',
                    'umbrella': '☔ 雨伞指数',
                    'traffic': '🚦 交通指数',
                    'air_purifier': '💨 空气净化器指数',
                    'pollen': '🌸 花粉扩散指数'
                };
                
                let idxHtml = '';
                
                for (let [key, val] of Object.entries(data.life_indices)) {
                    if (typeof val === 'object' && val !== null) {
                        // 获取中文名称，如果没有映射则使用原字段名（将下划线替换为空格）
                        const displayName = indexNameMap[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        
                        // 处理等级和简要描述，确保不为空
                        const level = val.level || '';
                        const brief = val.brief || '';
                        const advice = val.advice || '暂无具体建议';
                        
                        // 根据指数类型添加不同的背景色或图标（可选）
                        let cardStyle = '';
                        if (key.includes('risk') || key === 'allergy' || key === 'cold_risk') {
                            cardStyle = 'border-left-color: #e76f51;'; // 风险类用橙红色
                        } else if (key.includes('comfort') || key === 'mood') {
                            cardStyle = 'border-left-color: #2a9d8f;'; // 舒适类用青绿色
                        } else if (key.includes('wash') || key === 'drying' || key === 'exercise') {
                            cardStyle = 'border-left-color: #e9c46a;'; // 适宜类用金黄色
                        }
                        
                        idxHtml += `<div class="life-item" style="${cardStyle}">
                            <h4 style="margin-bottom: 8px;">${displayName}</h4>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
                                ${level ? `<span style="background: #e9f0f9; padding: 3px 12px; border-radius: 30px; font-size: 0.9rem; font-weight: 600;">${level}</span>` : ''}
                                ${brief ? `<span style="background: #d4edda; color: #155724; padding: 3px 12px; border-radius: 30px; font-size: 0.9rem;">${brief}</span>` : ''}
                            </div>
                            <div class="advice" style="color: #2c3e50; line-height: 1.5;">💡 ${advice}</div>
                        </div>`;
                    }
                }
                
                // 如果没有生成任何内容，显示提示
                if (idxHtml) {
                    indicesContainer.innerHTML = idxHtml;
                } else {
                    indicesContainer.innerHTML = '<div style="text-align: center; padding: 30px; color: #7f8c8d;">暂无生活指数数据</div>';
                }
            } else {
                indicesCard.style.display = 'none';
            }
        }

        // 辅助: 创建指标卡片
        function createMetric(label, value, sub) {
            return `<div class="metric"><div class="label">${label}</div><div class="value">${value}</div>${sub ? '<div class="sub">'+sub+'</div>' : ''}</div>`;
        }

        // 绑定按钮事件
        fetchBtn.addEventListener('click', fetchWeather);
        // 允许回车
        cityInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') fetchWeather(); });

        // 初次加载自动查询(可选), 展示数据
        window.addEventListener('load', () => {
            fetchWeather();
        });
    })();
</script>
</body>
</html>
