<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花样交互 · 单文件游乐场</title>
    <!-- 所有样式、交互全部内嵌，一个文件走天下 -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            perspective: 1200px;
        }

        /* 主卡片——像一个进入异次元的入口 */
        .master-board {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 28, 46, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(90, 150, 255, 0.25);
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 40px 70px rgba(0, 10, 30, 0.8), 0 0 0 1px rgba(70, 140, 255, 0.2) inset;
            transition: transform 0.3s ease;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* 通用交互卡片样式 */
        .card {
            background: rgba(12, 20, 32, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(80, 160, 255, 0.25);
            border-radius: 32px;
            padding: 22px 18px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6);
            transition: all 0.15s ease;
            color: #eef5ff;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: #4a9eff;
            box-shadow: 0 20px 35px -8px #1e3f6e;
            transform: translateY(-3px) scale(1.01);
        }

        .card-title {
            font-weight: 500;
            font-size: 1.3rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed #3f5e8a;
            padding-bottom: 10px;
            letter-spacing: 0.3px;
            color: #b6d4ff;
        }

        .card-title span {
            background: #23487a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 400;
            color: white;
        }

        /* ---------- 交互1: 3D悬浮魔方 ---------- */
        .cube-scene {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
            cursor: move; /* 提示可拖拽 */
        }

        .cube {
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .cube-face {
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #2f4f8a, #1b2f55);
            border: 2px solid #7ab7ff;
            box-shadow: 0 0 20px rgba(60, 160, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px blue;
            border-radius: 12px;
            backface-visibility: visible;
        }

        .front  { transform: rotateY(0deg) translateZ(60px); background: #2b4f8a radial-gradient(circle at 30% 30%, #6ea5ff, #15315f); }
        .back   { transform: rotateY(180deg) translateZ(60px); background: #2b4f8a radial-gradient(circle at 70% 70%, #6ea5ff, #142e58); }
        .left   { transform: rotateY(-90deg) translateZ(60px); background: #1f3f72 radial-gradient(circle at 30% 70%, #7fb0ff, #0e2647); }
        .right  { transform: rotateY(90deg) translateZ(60px); background: #1f3f72 radial-gradient(circle at 70% 30%, #7fb0ff, #0f284b); }
        .top    { transform: rotateX(90deg) translateZ(60px); background: #3567b5 radial-gradient(circle at 40% 40%, #b0d3ff, #174185); }
        .bottom { transform: rotateX(-90deg) translateZ(60px); background: #1f3f85 radial-gradient(circle at 60% 60%, #99c1ff, #0b2652); }

        /* 坐标轴提示 */
        .coord-hint {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
            color: #aac9ff;
            font-size: 0.85rem;
        }

        /* ---------- 交互2: 混沌摆 · 鼠标力道绘画 ---------- */
        .pendulum-canvas-box {
            background: #0b1422;
            border-radius: 28px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #pendulumCanvas {
            width: 100%;
            aspect-ratio: 1/0.9;
            background: #0a1020;
            border-radius: 24px;
            box-shadow: 0 0 0 2px #284466;
            cursor: crosshair;
            touch-action: none;  /* 防止触摸时滚动 */
        }

        .slider-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            width: 100%;
            align-items: center;
            color: #b3d0ff;
        }

        input[type=range] { flex: 1; background: #152c44; height: 6px; border-radius: 10px; accent-color: #4080ff; }

        /* ---------- 交互3: 打字机 · 量子随机 ---------- */
        .typewriter-area {
            background: #0a1622;
            border-radius: 24px;
            padding: 18px;
            font-family: 'Courier New', monospace;
        }

        #typewriterOutput {
            background: #030811;
            border: 1px solid #3865a0;
            border-radius: 16px;
            padding: 18px 15px;
            min-height: 120px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #c9e2ff;
            box-shadow: inset 0 0 15px #00000070;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .quantum-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .quantum-buttons button {
            background: #14345c;
            border: 1px solid #3d71b0;
            color: white;
            padding: 12px 18px;
            border-radius: 36px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.1s;
            flex: 1 0 auto;
            box-shadow: 0 5px 10px #00000055;
        }

        .quantum-buttons button:hover {
            background: #1f4d85;
            border-color: #85bcff;
            transform: scale(1.02);
        }

        /* ---------- 交互4: 音频波动 · 触摸渲染 ---------- */
        .audio-viz-box {
            background: #101c30;
            border-radius: 28px;
            padding: 15px;
        }

        #audioCanvas {
            width: 100%;
            aspect-ratio: 16/5;
            background: #070e18;
            border-radius: 28px;
            box-shadow: 0 0 0 2px #32547a;
            display: block;
        }

        .audio-controls {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .audio-btn {
            background: #1d375a;
            border: none;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 55px;
            font-size: 1.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            box-shadow: 0 5px 0 #0f1e2e;
        }

        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f1e2e;
        }

        /* ---------- 交互5: 量子纠缠开关场 ---------- */
        .switch-farm {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px 10px;
            margin: 15px 0 20px;
        }

        .quantum-switch {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: #14243b;
            border-radius: 36px;
            padding: 14px 5px;
            border: 1px solid #2b5580;
        }

        .quantum-switch input[type="checkbox"] {
            width: 45px;
            height: 45px;
            border-radius: 45px;
            appearance: none;
            -webkit-appearance: none;
            background: #1f304a;
            border: 3px solid #4f7eb3;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: inset 0 0 10px #00000099;
        }

        .quantum-switch input[type="checkbox"]:checked {
            background: radial-gradient(circle, #7fb9ff, #2e6cd9);
            border-color: #b7dbff;
            box-shadow: 0 0 20px #4880ff;
        }

        #entangleResult {
            background: #1f304a;
            border-radius: 36px;
            padding: 15px 20px;
            font-size: 1.3rem;
            text-align: center;
            font-weight: 600;
            color: #c3dcff;
            border: 1px solid #4e88ce;
        }

        /* 响应式修正 */
        @media (max-width: 700px) {
            .master-board { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="master-board">
        <!-- 卡片 1: 3D拖拽魔方 -->
        <div class="card">
            <div class="card-title">🌀 3D 悬浮魔方 <span>鼠标拖拽</span></div>
            <div class="cube-scene" id="cubeScene">
                <div class="cube" id="draggableCube">
                    <div class="cube-face front">F</div>
                    <div class="cube-face back">B</div>
                    <div class="cube-face left">L</div>
                    <div class="cube-face right">R</div>
                    <div class="cube-face top">U</div>
                    <div class="cube-face bottom">D</div>
                </div>
            </div>
            <div class="coord-hint">
                <span>X: <span id="rotX">-20</span>°</span>
                <span>Y: <span id="rotY">30</span>°</span>
                <span style="color:#7cb9ff;">↓ 拖动旋转</span>
            </div>
        </div>

        <!-- 卡片 2: 混沌摆 / 粒子拖尾绘画 -->
        <div class="card">
            <div class="card-title">🎨 力场混沌摆 <span>鼠标拖动画线</span></div>
            <div class="pendulum-canvas-box">
                <canvas id="pendulumCanvas" width="500" height="400"></canvas>
                <div class="slider-row">
                    <span>⚡阻尼</span>
                    <input type="range" id="dampingSlider" min="0.95" max="0.998" step="0.001" value="0.985">
                    <span id="dampVal">0.985</span>
                </div>
            </div>
        </div>

        <!-- 卡片 3: 量子打字机 / 随机字符 -->
        <div class="card">
            <div class="card-title">📠 量子打字机 <span>随机叠加</span></div>
            <div class="typewriter-area">
                <div id="typewriterOutput">🪐 你好，交互世界...</div>
                <div class="quantum-buttons">
                    <button id="btnAddChar">🌌 叠加量子字符</button>
                    <button id="btnClearText">♻️ 清空</button>
                    <button id="btnRandomWord">🧬 随机单词</button>
                </div>
            </div>
        </div>

        <!-- 卡片 4: 音频可视化 / 拟声波动 -->
        <div class="card">
            <div class="card-title">📻 触摸波函数 <span>点击生成声纹</span></div>
            <div class="audio-viz-box">
                <canvas id="audioCanvas" width="500" height="120"></canvas>
                <div class="audio-controls">
                    <button class="audio-btn" id="noteC">🎵</button>
                    <button class="audio-btn" id="noteD">🎶</button>
                    <button class="audio-btn" id="noteE">🔊</button>
                    <button class="audio-btn" id="randomNoise">🌊</button>
                </div>
            </div>
        </div>

        <!-- 卡片 5: 量子纠缠开关场 -->
        <div class="card">
            <div class="card-title">⚛️ 纠缠开关 <span>点击影响集体态</span></div>
            <div class="switch-farm" id="switchFarm">
                <!-- 由js生成5个开关，但也可以静态写好, 然后js监听 -->
            </div>
            <div id="entangleResult">✨ 观测态: 待触发</div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- 全局初始化 ----------
            
            // 1. 3D 魔方拖拽交互 -------------------------------------------------
            const cube = document.getElementById('draggableCube');
            const rotXSpan = document.getElementById('rotX');
            const rotYSpan = document.getElementById('rotY');
            let isDragging = false;
            let lastX, lastY;
            let currentRotX = -20, currentRotY = 30; // 初始匹配CSS

            const scene = document.getElementById('cubeScene');
            scene.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', onDrag);
            window.addEventListener('mouseup', stopDrag);
            // 触摸事件
            scene.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0]); });
            window.addEventListener('touchmove', (e) => { e.preventDefault(); if(isDragging) onDrag(e.touches[0]); });
            window.addEventListener('touchend', stopDrag);

            function startDrag(e) {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
                scene.style.cursor = 'grabbing';
            }

            function onDrag(e) {
                if (!isDragging) return;
                e.preventDefault();
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                // 灵敏度
                currentRotY += dx * 0.8;
                currentRotX -= dy * 0.5; // 反向自然
                // 限制X角度防止翻转太晕
                if (currentRotX > 80) currentRotX = 80;
                if (currentRotX < -80) currentRotX = -80;

                updateCubeTransform();
                lastX = e.clientX;
                lastY = e.clientY;
            }

            function stopDrag() {
                isDragging = false;
                scene.style.cursor = 'move';
            }

            function updateCubeTransform() {
                cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
                rotXSpan.textContent = Math.round(currentRotX);
                rotYSpan.textContent = Math.round(currentRotY);
            }
            updateCubeTransform(); // 初始化显示

            // 2. 混沌摆画板 (双摆模拟 + 鼠标拖拽扰动) --------------------------
            const canvas = document.getElementById('pendulumCanvas');
            const ctx = canvas.getContext('2d');
            const dampSlider = document.getElementById('dampingSlider');
            const dampVal = document.getElementById('dampVal');
            let width = canvas.clientWidth, height = canvas.clientHeight;
            function resizeCanvas() {
                width = canvas.clientWidth;
                height = canvas.clientHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // 双摆参数
            let a1 = Math.PI / 2, a2 = Math.PI / 2, a1_v = 0, a2_v = 0;
            const g = 0.5; // 重力系数
            let damping = 0.985;
            let trail = []; // 存储尾巴位置 {x, y}
            const MAX_TRAIL = 100;

            function getPendulumPos() {
                const len = 80;  // 摆长
                const originX = width/2, originY = height/3;
                let x1 = originX + len * Math.sin(a1);
                let y1 = originY + len * Math.cos(a1);
                let x2 = x1 + len * Math.sin(a2);
                let y2 = y1 + len * Math.cos(a2);
                return { x1, y1, x2, y2, originX, originY };
            }

            function updatePendulum() {
                // 简单双摆欧拉近似 (仅供视觉效果，物理不完全精确但足够艺术)
                let num1 = -g * (2 * Math.sin(a1) + Math.sin(a2));
                let num2 = -g * Math.sin(a2);
                let denom1 = 2 - Math.cos(a1 - a2);
                // 简化加速度 (为了视觉流畅)
                let a1_a = (num1 - Math.cos(a1 - a2) * num2) / denom1;
                let a2_a = (2 * num2 - Math.cos(a1 - a2) * num1) / denom1;
                
                a1_v += a1_a;
                a2_v += a2_a;
                a1 += a1_v;
                a2 += a2_v;
                // 阻尼
                a1_v *= damping;
                a2_v *= damping;
            }

            function drawTrail() {
                if (trail.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = '#7aaaff';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.shadowColor = '#3f9eff';
                ctx.shadowBlur = 15;
                for (let i = 0; i < trail.length - 1; i++) {
                    let p1 = trail[i];
                    let p2 = trail[i+1];
                    if (!p1 || !p2) continue;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `hsl(${200 + i * 2}, 80%, 70%)`;
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
            }

            function drawPendulum() {
                ctx.clearRect(0, 0, width, height);
                // 绘制尾巴
                drawTrail();

                const pos = getPendulumPos();
                // 画线
                ctx.beginPath();
                ctx.strokeStyle = '#b5d6ff';
                ctx.lineWidth = 3;
                ctx.moveTo(pos.originX, pos.originY);
                ctx.lineTo(pos.x1, pos.y1);
                ctx.lineTo(pos.x2, pos.y2);
                ctx.stroke();

                // 画球
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.fillStyle = '#c2e0ff';
                ctx.arc(pos.x1, pos.y1, 10, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#ffd966';
                ctx.arc(pos.x2, pos.y2, 10, 0, 2*Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function animatePendulum() {
                updatePendulum();
                drawPendulum();
                requestAnimationFrame(animatePendulum);
            }
            animatePendulum();

            // 鼠标/触摸 扰动 + 记录轨迹
            canvas.addEventListener('mousemove', (e) => {
                if (e.buttons !== 1) return; // 左键按下才扰动
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleY;
                // 给摆施加冲击 (靠近末端)
                let pos = getPendulumPos();
                let dx = mouseX - pos.x2;
                let dy = mouseY - pos.y2;
                let dist = Math.hypot(dx, dy);
                if (dist < 40) {
                    a1_v += (dx * 0.01 + dy * 0.005) * 0.5;
                    a2_v += (dx * 0.02 + dy * 0.01) * 0.5;
                }
                // 记录轨迹点 (把鼠标当作吸引子)
                trail.push({ x: mouseX, y: mouseY });
                if (trail.length > MAX_TRAIL) trail.shift();
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let touch = e.touches[0];
                    let mouseX = (touch.clientX - rect.left) * scaleX;
                    let mouseY = (touch.clientY - rect.top) * scaleY;
                    let pos = getPendulumPos();
                    let dx = mouseX - pos.x2;
                    let dy = mouseY - pos.y2;
                    if (Math.hypot(dx, dy) < 60) {
                        a1_v += (dx * 0.01 + dy * 0.005);
                        a2_v += (dx * 0.02 + dy * 0.01);
                    }
                    trail.push({ x: mouseX, y: mouseY });
                    if (trail.length > MAX_TRAIL) trail.shift();
                }
            }, { passive: false });

            dampSlider.addEventListener('input', (e) => {
                damping = parseFloat(e.target.value);
                dampVal.textContent = damping.toFixed(3);
            });

            // 3. 量子打字机 -----------------------------------------------------
            const output = document.getElementById('typewriterOutput');
            const btnAdd = document.getElementById('btnAddChar');
            const btnClear = document.getElementById('btnClearText');
            const btnRand = document.getElementById('btnRandomWord');
            const chars = '⚛️🌀🌌✨🌟💫🌠🌪️🌈☄️🔥❄️🌊🔮🧩🎲♾️';

            btnAdd.addEventListener('click', () => {
                let randChar = chars[Math.floor(Math.random() * chars.length)];
                output.textContent += randChar;
            });

            btnClear.addEventListener('click', () => {
                output.textContent = '⏳ 虚空重启 ';
            });

            btnRand.addEventListener('click', () => {
                const words = ['量子泡沫', '纠缠态', '波函数坍缩', '平行世界', '超弦', 'M理论', '黑洞熵', '暗物质', '反德西特'];
                output.textContent += ' ' + words[Math.floor(Math.random() * words.length)] + ' ';
            });

            // 4. 音频可视化 伪波纹 ---------------------------------------------
            const audioCanvas = document.getElementById('audioCanvas');
            const aCtx = audioCanvas.getContext('2d');
            let audioWidth = audioCanvas.width = audioCanvas.clientWidth;
            let audioHeight = audioCanvas.height = audioCanvas.clientHeight;
            window.addEventListener('resize', () => {
                audioCanvas.width = audioCanvas.clientWidth;
                audioCanvas.height = audioCanvas.clientHeight;
                audioWidth = audioCanvas.width;
                audioHeight = audioCanvas.height;
            });

            function drawWave(type) {
                aCtx.clearRect(0, 0, audioWidth, audioHeight);
                aCtx.beginPath();
                aCtx.strokeStyle = '#99ccff';
                aCtx.lineWidth = 4;
                aCtx.shadowBlur = 22;
                aCtx.shadowColor = '#4aa3ff';
                const mid = audioHeight/2;
                const amp = audioHeight * 0.4;
                for (let x = 0; x < audioWidth; x+=5) {
                    let y;
                    if (type === 'sine') y = mid + amp * Math.sin(x * 0.03 + Date.now()*0.01);
                    else if (type === 'square') y = (Math.sin(x*0.03 + Date.now()*0.01) > 0) ? mid+amp : mid-amp;
                    else y = mid + (Math.random() * amp - amp/2);
                    if (x === 0) aCtx.moveTo(x, y);
                    else aCtx.lineTo(x, y);
                }
                aCtx.stroke();
                aCtx.shadowBlur = 0;
            }

            let waveInterval;
            function startWaveLoop(type) {
                if (waveInterval) clearInterval(waveInterval);
                waveInterval = setInterval(() => drawWave(type), 60);
            }
            startWaveLoop('sine');

            document.getElementById('noteC').addEventListener('click', () => startWaveLoop('sine'));
            document.getElementById('noteD').addEventListener('click', () => startWaveLoop('square'));
            document.getElementById('noteE').addEventListener('click', () => startWaveLoop('sawtooth')); // 降级同random
            document.getElementById('randomNoise').addEventListener('click', () => startWaveLoop('noise'));

            // 5. 量子纠缠开关场 -------------------------------------------------
            const switchFarm = document.getElementById('switchFarm');
            for (let i = 0; i < 6; i++) {
                let sw = document.createElement('div');
                sw.className = 'quantum-switch';
                sw.innerHTML = `<span style="font-size:0.9rem;">Q${i+1}</span><input type="checkbox" id="switch${i}">`;
                switchFarm.appendChild(sw);
            }
            const resultSpan = document.getElementById('entangleResult');
            function updateEntangle() {
                let checkedCount = 0;
                for (let i = 0; i < 6; i++) {
                    let cb = document.getElementById(`switch${i}`);
                    if (cb && cb.checked) checkedCount++;
                }
                // 纠缠规则：奇偶性决定文字
                if (checkedCount % 2 === 0) {
                    resultSpan.innerHTML = `🌀 纠缠态: 偶数个开关开启 → 自旋向上 (↑) 叠加态`;
                } else {
                    resultSpan.innerHTML = `⚡ 纠缠态: 奇数个开关开启 → 自旋向下 (↓) 坍缩`;
                }
                if (checkedCount === 0) resultSpan.innerHTML = '✨ 观测态: 真空真空';
            }
            switchFarm.addEventListener('change', updateEntangle);
            updateEntangle();

        })();
    </script>
</body>
</html>
