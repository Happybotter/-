<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>轻量交互 · 手机畅玩版</title>
    <style>
        /* 极简重置 + 手机友好 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        body {
            background: #0c1420;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* 单列布局，更适合手机滑动 */
        .phone-board {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 卡片设计 —— 轻薄、毛玻璃 */
        .card {
            background: rgba(20, 30, 45, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 170, 255, 0.25);
            border-radius: 32px;
            padding: 20px 16px;
            box-shadow: 0 15px 30px -5px #00000080;
            color: #edf3ff;
            transition: transform 0.1s;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 16px;
            padding-left: 6px;
            border-left: 6px solid #3f8aff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title span {
            background: #253b5c;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 40px;
            color: #b5d6ff;
        }

        /* ----- 3D 魔方（简化旋转，不用拖拽，改用按钮或轻触）----- */
        .cube-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .cube-scene {
            width: 180px;
            height: 180px;
            perspective: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .cube {
            width: 110px;
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        .cube-face {
            position: absolute;
            width: 110px;
            height: 110px;
            background: linear-gradient(145deg, #2d4d7a, #19355c);
            border: 2px solid #6aa5ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 8px #0088ff;
            box-shadow: 0 0 15px #2f6bb0;
            backface-visibility: visible;
        }

        .front  { transform: rotateY(0deg) translateZ(55px); }
        .back   { transform: rotateY(180deg) translateZ(55px); }
        .left   { transform: rotateY(-90deg) translateZ(55px); }
        .right  { transform: rotateY(90deg) translateZ(55px); }
        .top    { transform: rotateX(90deg) translateZ(55px); }
        .bottom { transform: rotateX(-90deg) translateZ(55px); }

        .cube-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .cube-btn {
            background: #1e3a62;
            border: none;
            color: white;
            width: 64px;
            height: 64px;
            border-radius: 64px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #0b1a2e;
            cursor: pointer;
            transition: 0.08s linear;
            -webkit-tap-highlight-color: transparent;
        }

        .cube-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b1a2e;
        }

        /* ----- 触摸绘画板（极简，只有轻量画线）----- */
        .draw-area {
            background: #0e1625;
            border-radius: 36px;
            padding: 12px;
        }

        #simpleCanvas {
            width: 100%;
            aspect-ratio: 1 / 0.9;
            background: #0b111e;
            border-radius: 28px;
            display: block;
            box-shadow: 0 0 0 2px #2a4a7a;
            touch-action: none;  /* 防止滚动/缩放 */
        }

        .draw-toolbar {
            display: flex;
            justify-content: space-around;
            margin-top: 14px;
        }

        .draw-btn {
            background: #1f3450;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 3px 0 #0e1f30;
            cursor: pointer;
            transition: 0.05s linear;
            min-width: 100px;
            text-align: center;
        }

        .draw-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* ----- 量子打字机(保留) 但按钮更大适合手指----- */
        .typewriter-box {
            background: #0f1b2b;
            border-radius: 30px;
            padding: 16px;
        }

        #phoneOutput {
            background: #030a14;
            border-radius: 28px;
            padding: 22px 16px;
            min-height: 110px;
            font-size: 1.3rem;
            font-family: 'Courier New', monospace;
            color: #b9dcff;
            border: 1px solid #325f99;
            margin-bottom: 18px;
            word-break: break-word;
            line-height: 1.5;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .big-btn {
            flex: 1 0 120px;
            background: #234579;
            border: none;
            color: white;
            padding: 18px 10px;
            border-radius: 60px;
            font-size: 1.15rem;
            font-weight: 600;
            box-shadow: 0 4px 0 #10223a;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
        }

        .big-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* ----- 开关场（网格调整更适合手指）----- */
        .switch-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px 10px;
            margin: 15px 0 15px;
        }

        .phone-switch {
            background: #1e314b;
            border-radius: 32px;
            padding: 16px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid #3e6bb0;
        }

        .phone-switch input[type="checkbox"] {
            width: 52px;
            height: 52px;
            appearance: none;
            -webkit-appearance: none;
            background: #1c2b42;
            border-radius: 52px;
            border: 3px solid #6184c0;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: inset 0 3px 8px black;
        }

        .phone-switch input[type="checkbox"]:checked {
            background: radial-gradient(circle, #8abcff, #2d70de);
            border-color: #c0e0ff;
            box-shadow: 0 0 20px #4a96ff;
        }

        #phoneEntangle {
            background: #1d324f;
            border-radius: 40px;
            padding: 18px;
            font-size: 1.3rem;
            text-align: center;
            border: 1px solid #5b8ed4;
        }

        /* 音频可视化 —— 降低帧率 节省性能 */
        .wave-box {
            background: #0e1e30;
            border-radius: 42px;
            padding: 18px;
        }

        #waveCanvas {
            width: 100%;
            aspect-ratio: 16/5;
            background: #040c18;
            border-radius: 28px;
            display: block;
            box-shadow: inset 0 0 10px #00000099;
        }

        .wave-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .wave-tap {
            background: #24466b;
            border: none;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 80px;
            font-size: 28px;
            box-shadow: 0 5px 0 #11273f;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .wave-tap:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #11273f;
        }
    </style>
</head>
<body>
    <div class="phone-board">
        <!-- 卡片1: 3D魔方（改用按钮旋转，省去拖拽监听） -->
        <div class="card">
            <div class="card-title">🧊 轻触魔方 <span>按钮旋转</span></div>
            <div class="cube-container">
                <div class="cube-scene">
                    <div class="cube" id="phoneCube">
                        <div class="cube-face front">F</div>
                        <div class="cube-face back">B</div>
                        <div class="cube-face left">L</div>
                        <div class="cube-face right">R</div>
                        <div class="cube-face top">U</div>
                        <div class="cube-face bottom">D</div>
                    </div>
                </div>
                <div class="cube-buttons">
                    <button class="cube-btn" id="rotLeft">↪️</button>
                    <button class="cube-btn" id="rotRight">↩️</button>
                    <button class="cube-btn" id="rotUp">⬆️</button>
                    <button class="cube-btn" id="rotDown">⬇️</button>
                </div>
            </div>
        </div>

        <!-- 卡片2: 触摸画板 (轻量绘图，无物理模拟) -->
        <div class="card">
            <div class="card-title">🖌️ 手指涂鸦 <span>触摸画线</span></div>
            <div class="draw-area">
                <canvas id="simpleCanvas" width="400" height="360"></canvas>
                <div class="draw-toolbar">
                    <button class="draw-btn" id="clearCanvas">🧽 清空</button>
                    <button class="draw-btn" id="colorToggle">🎨 换色</button>
                </div>
            </div>
        </div>

        <!-- 卡片3: 量子打字机（大字按钮） -->
        <div class="card">
            <div class="card-title">📟 量子打字机 <span>拇指按</span></div>
            <div class="typewriter-box">
                <div id="phoneOutput">✨ 轻触宇宙...</div>
                <div class="button-row">
                    <button class="big-btn" id="addCharBtn">🌌 叠加符</button>
                    <button class="big-btn" id="addWordBtn">🧬 单词</button>
                    <button class="big-btn" id="clearTypeBtn">🗑️ 清空</button>
                </div>
            </div>
        </div>

        <!-- 卡片4: 轻量音频波浪 (降低刷新率) -->
        <div class="card">
            <div class="card-title">📡 指尖波浪 <span>轻点变奏</span></div>
            <div class="wave-box">
                <canvas id="waveCanvas" width="400" height="90"></canvas>
                <div class="wave-buttons">
                    <button class="wave-tap" id="waveSine">🌊</button>
                    <button class="wave-tap" id="waveSquare">📐</button>
                    <button class="wave-tap" id="waveRand">✨</button>
                </div>
            </div>
        </div>

        <!-- 卡片5: 纠缠开关（手指友好大开关） -->
        <div class="card">
            <div class="card-title">⚛️ 纠缠开关 <span>点击影响态</span></div>
            <div class="switch-grid" id="switchGrid"></div>
            <div id="phoneEntangle">🌀 等待观测</div>
        </div>
    </div>

    <script>
        (function() {
            // 1. 魔方按钮旋转 (只改变 transform，无拖拽监听，极省性能)
            const cube = document.getElementById('phoneCube');
            let rotX = -20, rotY = 30;
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

            document.getElementById('rotLeft').addEventListener('click', () => { rotY -= 20; updateCube(); });
            document.getElementById('rotRight').addEventListener('click', () => { rotY += 20; updateCube(); });
            document.getElementById('rotUp').addEventListener('click', () => { rotX -= 15; if(rotX < -70) rotX = -70; updateCube(); });
            document.getElementById('rotDown').addEventListener('click', () => { rotX += 15; if(rotX > 70) rotX = 70; updateCube(); });
            function updateCube() { cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`; }

            // 2. 手指涂鸦画板（极简画线，无物理模拟，帧率0额外负载）
            const canvas = document.getElementById('simpleCanvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.clientWidth, h = canvas.clientHeight;
            function resizeDraw() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                w = canvas.width; h = canvas.height;
                ctx.fillStyle = '#0b111e';
                ctx.fillRect(0, 0, w, h);
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#ffaa66';
            }
            window.addEventListener('resize', resizeDraw);
            resizeDraw();

            let drawing = false;
            let lastX, lastY;
            let colorIndex = 0;
            const colors = ['#ffaa66', '#66ffcc', '#88aaff', '#ff99c8', '#ffffff'];

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                lastX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                lastY = (touch.clientY - rect.top) * (canvas.height / rect.height);
                drawing = true;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!drawing) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                let x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                let y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
                lastX = x; lastY = y;
            });

            canvas.addEventListener('touchend', () => { drawing = false; });
            canvas.addEventListener('touchcancel', () => { drawing = false; });

            document.getElementById('clearCanvas').addEventListener('click', () => {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#0b111e';
                ctx.fillRect(0, 0, w, h);
            });

            document.getElementById('colorToggle').addEventListener('click', () => {
                colorIndex = (colorIndex + 1) % colors.length;
                ctx.strokeStyle = colors[colorIndex];
            });

            // 3. 量子打字机
            const phoneOut = document.getElementById('phoneOutput');
            const symbols = '⚛️🌀🌌✨🌟💫🌠🌪️🌈☄️🔥❄️🌊🔮🧩🎲♾️';
            document.getElementById('addCharBtn').addEventListener('click', () => {
                phoneOut.textContent += symbols[Math.floor(Math.random() * symbols.length)];
            });
            document.getElementById('addWordBtn').addEventListener('click', () => {
                const words = ['纠缠', '坍缩', '平行宇宙', '超弦', '黑洞', '暗物质', '夸克', '玻色子'];
                phoneOut.textContent += ' ' + words[Math.floor(Math.random() * words.length)] + ' ';
            });
            document.getElementById('clearTypeBtn').addEventListener('click', () => {
                phoneOut.textContent = '🌀 虚空重生';
            });

            // 4. 波浪（极低帧率，使用 requestAnimationFrame 但加长间隔）
            const waveCanvas = document.getElementById('waveCanvas');
            const wCtx = waveCanvas.getContext('2d');
            let waveW = waveCanvas.width = waveCanvas.clientWidth;
            let waveH = waveCanvas.height = waveCanvas.clientHeight;
            window.addEventListener('resize', () => {
                waveCanvas.width = waveCanvas.clientWidth;
                waveCanvas.height = waveCanvas.clientHeight;
                waveW = waveCanvas.width; waveH = waveCanvas.height;
            });

            let waveType = 'sine';
            function drawWaveOnce() {
                wCtx.clearRect(0, 0, waveW, waveH);
                wCtx.beginPath();
                wCtx.strokeStyle = '#88ccff';
                wCtx.lineWidth = 3;
                const mid = waveH / 2;
                const amp = waveH * 0.35;
                const time = Date.now() * 0.005; // 慢速变化
                for (let x = 0; x < waveW; x += 6) {
                    let y = mid;
                    if (waveType === 'sine') y = mid + amp * Math.sin(x * 0.025 + time);
                    else if (waveType === 'square') y = (Math.sin(x * 0.025 + time) > 0) ? mid + amp : mid - amp;
                    else y = mid + (Math.random() * amp * 1.2 - amp*0.6);
                    if (x === 0) wCtx.moveTo(x, y);
                    else wCtx.lineTo(x, y);
                }
                wCtx.stroke();
            }
            // 使用定时器降低到约 10fps，非常省电
            setInterval(drawWaveOnce, 100); // 100ms = 10fps
            document.getElementById('waveSine').addEventListener('click', () => { waveType = 'sine'; });
            document.getElementById('waveSquare').addEventListener('click', () => { waveType = 'square'; });
            document.getElementById('waveRand').addEventListener('click', () => { waveType = 'rand'; });

            // 5. 开关纠缠（6个大开关）
            const grid = document.getElementById('switchGrid');
            for (let i = 0; i < 6; i++) {
                let div = document.createElement('div');
                div.className = 'phone-switch';
                div.innerHTML = `<span>Q${i+1}</span><input type="checkbox" id="chk${i}">`;
                grid.appendChild(div);
            }
            const entangleDiv = document.getElementById('phoneEntangle');
            function updateEntangle() {
                let cnt = 0;
                for (let i=0; i<6; i++) {
                    if (document.getElementById(`chk${i}`).checked) cnt++;
                }
                if (cnt % 2 === 0) entangleDiv.innerText = '🌀 偶纠缠 → 自旋向上 ↑';
                else entangleDiv.innerText = '⚡ 奇纠缠 → 自旋向下 ↓';
                if (cnt === 0) entangleDiv.innerText = '✨ 观测到真空';
            }
            grid.addEventListener('change', updateEntangle);
            updateEntangle();
        })();
    </script>
</body>
</html>
